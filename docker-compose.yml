services:
  ingestion-api:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:${INGESTION_PORT:-8000}:8000"
    volumes:
      - ./common:/app/common
      - ./ingestion_api:/app/ingestion_api
      - ./secrets:/app/secrets:ro
    command: sh -c "uvicorn ingestion_api.main:app --host 0.0.0.0 --port 8000 --reload"

  slack-bot:
    build: .
    env_file:
      - .env
    ports:
      # Slack events/commands/interactivity + OAuth install/redirect (issues
      # #61/#62). Localhost-only for local dev; the Fly.io deploy (fly.toml)
      # exposes this publicly with TLS termination instead.
      - "127.0.0.1:${SLACK_PORT:-3000}:3000"
    volumes:
      - ./common:/app/common
      - ./decisions:/app/decisions
      - ./ingestion_api:/app/ingestion_api
      - ./memoryAnswer:/app/memoryAnswer
      - ./reconciliation:/app/reconciliation
      - ./registrations:/app/registrations
      - ./student-org-agent:/app/student-org-agent
      - ./secrets:/app/secrets:ro
    command: sh -c "python /app/student-org-agent/app.py"

  drive-sync-worker:
    build: .
    env_file:
      - .env
    volumes:
      - ./common:/app/common
      - ./ingestion_api:/app/ingestion_api
      - ./tools:/app/tools
      - ./secrets:/app/secrets:ro
    command: sh -c "python -m tools.drive_poll_worker"

  # Public HTTPS tunnel to the slack-bot so Slack's servers can reach slash
  # commands / events during local dev (production uses the Fly.io deploy
  # instead). Requires NGROK_AUTHTOKEN in .env (get one at
  # https://dashboard.ngrok.com/get-started/your-authtoken). After `up`, grab
  # the public URL from http://localhost:4040 (or `docker compose logs ngrok`)
  # and set it as the Request URL (<url>/slack/events) in your Slack app config.
  ngrok:
    image: ngrok/ngrok:latest
    depends_on:
      - slack-bot
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http slack-bot:3000
    ports:
      - "127.0.0.1:4040:4040"  # ngrok inspection UI / local API
